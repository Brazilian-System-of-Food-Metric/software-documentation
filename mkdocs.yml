site_name: BSFM - Brazilian System of Food Metric
site_url: https://brazilian-system-of-food-metric.github.io/software-documentation/
site_description: Plataforma revolucionaria de nutricao inteligente com IA para transformar a saude alimentar dos brasileiros
site_author: BSFM Team
use_directory_urls: false

theme:
  name: material
  language: pt-BR
  logo: stylesheets/images/logobsfm.png
  favicon: stylesheets/images/Iconebsfm.png
  palette:
    - scheme: slate
      primary: black
      accent: orange
      toggle:
        icon: material/weather-night
        name: Modo escuro
    - scheme: default
      primary: black
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Modo claro
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
  font:
    text: Inter
    code: Fira Code
  icon:
    repo: fontawesome/brands/github

repo_name: BSFM/Brazilian-System-of-Food-Metric
repo_url: https://github.com/Brazilian-System-of-Food-Metric

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.details

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/BSFM
      name: GitHub
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/bsfm_br
      name: Twitter
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/company/bsfm
      name: LinkedIn

extra_css:
  - stylesheets/extra.css
  - stylesheets/custom.css

extra_javascript:
  - js/custom.js

nav:
  - Home: index.md
  - Visao Geral:
    - Sobre o BSFM: about/visao-missao.md
    - Planejamento: bsfm/planejamento.md
    - Roadmap: roadmap/index.md
    - Changelog: changelog/index.md
  - Guias:
    - Guia do Usuario: guia-usuario/introducao.md
    - Guia do Desenvolvedor: guia-desenvolvedor/index.md
    - Instalacao: bsfm/instalacao.md
    - Configuracao: bsfm/config.md
    - Comecar a Aprender: bsfm/comecar-aprender.md
  - Referencia:
    - Referencia Tecnica: bsfm/referencia.md
    - Casos de Uso: caso-de-uso/index.md
    - Glossario: glossario/index.md
  - CoreAnalytics:
    - Visao Geral: core-analytics/index.md
    - NutriBrain Service: core-analytics/nutribrain.md
    - Context Injector: core-analytics/context-injector.md
    - OCR e Tesseract: core-analytics/ocr-tesseract.md
    - Health Score: core-analytics/health-score.md
    - Dados de Saude: core-analytics/dados-saude.md
    - API de Rotulos: core-analytics/api-rotulos.md

copyright: |
  Copyright (c) 2026-2036 Brazilian System of Food Metric | BSFM
